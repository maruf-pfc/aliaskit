name: Bug Report
description: Create a report to help us improve Aliaskit
title: "[Bug]: "
labels: ["bug", "needs triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: bug-description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Tell us what went wrong...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide specific steps to reproduce the behavior.
      placeholder: |
        1. Run '...'
        2. See error '...'
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating System
      description: e.g., Ubuntu 22.04, Debian 11, MacOS
      placeholder: Ubuntu 22.04
    validations:
      required: true
